<!DOCTYPE html>
<html>
<head>
    <title>Driver Fatigue System v3</title>

    <style>
        body {
            font-family: Arial;
            background: #0b0f1a;
            color: white;
            text-align: center;
        }

        #wrap {
            position: relative;
            display: inline-block;
        }

        video {
            border-radius: 12px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .panel {
            margin-top: 8px;
            font-size: 18px;
        }

        #status {
            font-size: 22px;
            margin-top: 10px;
        }

        #trend {
            margin-top: 20px;
            background: #111827;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h2>🚗 Driver Fatigue Monitoring (MediaPipe + Microsleep AI)</h2>

<div id="wrap">
    <video id="video" autoplay playsinline width="480"></video>
    <canvas id="overlay" width="480" height="360"></canvas>
</div>

<h3 id="status">Status: Connecting...</h3>

<div class="panel" id="score">Score: --</div>
<div class="panel" id="ear">EAR: --</div>
<div class="panel" id="blink">Blinks: --</div>
<div class="panel" id="micro">Microsleep: --</div>

<canvas id="trend" width="480" height="140"></canvas>

<!-- 🔊 AUDIO ALARM -->
<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto"></audio>

<script>

// ---------------------------
// UI ELEMENTS
// ---------------------------
const video = document.getElementById("video");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

const statusEl = document.getElementById("status");
const scoreEl = document.getElementById("score");
const earEl = document.getElementById("ear");
const blinkEl = document.getElementById("blink");
const microEl = document.getElementById("micro");

const trendCanvas = document.getElementById("trend");
const tctx = trendCanvas.getContext("2d");

const alarm = document.getElementById("alarm");

// ---------------------------
// WEBRTC
// ---------------------------
let pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
});

let dc = pc.createDataChannel("status");

// ---------------------------
// DATA CHANNEL
// ---------------------------
dc.onopen = () => {
    console.log("✅ DataChannel OPENED");
    statusEl.innerText = "Status: Connected";
};

dc.onmessage = (event) => {

    const data = JSON.parse(event.data);

    console.log("DATA:", data);

    // ---------------------------
    // UI UPDATE
    // ---------------------------
    statusEl.innerText = "Status: " + data.status;
    scoreEl.innerText = "Score: " + data.score;
    earEl.innerText = "EAR: " + data.avg_ear;
    blinkEl.innerText = "Blinks: " + data.blink_count;
    microEl.innerText = "Microsleep: " + data.microsleep;

    // ---------------------------
    // ALERT SYSTEM
    // ---------------------------
    if (data.status === "CRITICAL" || data.microsleep) {

        document.body.style.background = "#3b0000";

        alarm.currentTime = 0;
        alarm.play().catch(e => console.log("Audio blocked:", e));

    } else {
        document.body.style.background = "#0b0f1a";
    }

    // ---------------------------
    // TREND GRAPH
    // ---------------------------
    drawTrend(data.trend || []);
};

// ---------------------------
// TREND GRAPH RENDER
// ---------------------------
function drawTrend(arr) {

    tctx.clearRect(0, 0, 480, 140);

    if (!arr || arr.length === 0) return;

    tctx.beginPath();
    tctx.strokeStyle = "lime";
    tctx.lineWidth = 2;

    arr.forEach((v, i) => {

        const x = i * 8;
        const y = 140 - v;

        if (i === 0) tctx.moveTo(x, y);
        else tctx.lineTo(x, y);
    });

    tctx.stroke();
}

// ---------------------------
// FAKE FACE BOX
// ---------------------------
function drawFaceBox() {

    ctx.clearRect(0, 0, 480, 360);

    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;
    ctx.strokeRect(140, 80, 200, 200);

    ctx.fillStyle = "red";
    ctx.fillText("Face Detected", 150, 70);
}

// ---------------------------
// CAMERA
// ---------------------------
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {

    video.srcObject = stream;

    stream.getTracks().forEach(t => pc.addTrack(t, stream));

    setInterval(drawFaceBox, 100);

    return pc.createOffer();
})
.then(o => pc.setLocalDescription(o))
.then(() =>
    fetch("http://localhost:8000/offer", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(pc.localDescription)
    })
)
.then(r => r.json())
.then(a => pc.setRemoteDescription(a))
.catch(err => console.error(err));

</script>

</body>
</html>
